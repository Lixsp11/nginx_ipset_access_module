name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nginx_version:
          - "1.24.0"
          - "1.26.3"
          - "1.27.4"

    steps:
      - name: Checkout module source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev \
            libssl-dev libipset-dev libcap-dev

      - name: Download NGINX ${{ matrix.nginx_version }} source
        run: |
          wget -q https://nginx.org/download/nginx-${{ matrix.nginx_version }}.tar.gz
          tar xzf nginx-${{ matrix.nginx_version }}.tar.gz

      - name: Build dynamic module
        run: |
          cd nginx-${{ matrix.nginx_version }}
          ./configure --with-compat \
            --add-dynamic-module=${{ github.workspace }}
          make modules

      - name: Prepare artifact
        run: |
          cd nginx-${{ matrix.nginx_version }}
          ARTIFACT_NAME="ngx_http_ipset_access-nginx-${{ matrix.nginx_version }}-linux-amd64.so"
          cp objs/ngx_http_ipset_access.so "${ARTIFACT_NAME}"
          sha256sum "${ARTIFACT_NAME}" > "${ARTIFACT_NAME}.sha256"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ngx_http_ipset_access-nginx-${{ matrix.nginx_version }}
          path: |
            nginx-${{ matrix.nginx_version }}/${{ env.ARTIFACT_NAME }}
            nginx-${{ matrix.nginx_version }}/${{ env.ARTIFACT_NAME }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.so
            artifacts/*.sha256
